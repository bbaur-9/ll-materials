<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="LL Materials">
  <title>LL Materials Picker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f5f0; --surface: #ffffff; --surface2: #f0f0eb;
      --text: #1a1a1a; --text2: #555550; --text3: #888882;
      --border: rgba(0,0,0,0.10); --border2: rgba(0,0,0,0.18);
      --green: #1a7a4a; --accent: #2a5caa; --accent-bg: #e8eefc;
      --radius: 12px; --radius-sm: 8px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #141414; --surface: #1e1e1e; --surface2: #252525;
        --text: #f0f0eb; --text2: #aaaaaa; --text3: #666660;
        --border: rgba(255,255,255,0.10); --border2: rgba(255,255,255,0.18);
        --green: #4caf80; --accent: #6b9ef5; --accent-bg: #0d1e3a;
      }
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; -webkit-font-smoothing: antialiased; }
    body { display: flex; flex-direction: column; min-height: 100vh; }
    header { background: var(--surface); border-bottom: 0.5px solid var(--border); padding: calc(env(safe-area-inset-top,0px) + 16px) 20px 14px; position: sticky; top: 0; z-index: 10; }
    header h1 { font-size: 17px; font-weight: 600; color: var(--text); }
    header p { font-size: 12px; color: var(--text3); margin-top: 2px; }
    main { flex: 1; padding: 16px 16px calc(env(safe-area-inset-bottom,0px) + 24px); max-width: 500px; margin: 0 auto; width: 100%; }
    .card { background: var(--surface); border-radius: var(--radius); border: 0.5px solid var(--border); margin-bottom: 12px; overflow: hidden; }
    .card-header { padding: 12px 16px 8px; font-size: 11px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text3); border-bottom: 0.5px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .card-header button { font-size: 11px; font-weight: 600; color: var(--accent); background: none; border: none; cursor: pointer; font-family: inherit; padding: 0; }
    .field { display: flex; align-items: center; padding: 0 16px; border-bottom: 0.5px solid var(--border); min-height: 52px; }
    .field:last-child { border-bottom: none; }
    .field label { flex: 1; font-size: 15px; color: var(--text); padding-right: 12px; }
    .input-wrap { display: flex; align-items: center; background: var(--surface2); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); overflow: hidden; }
    .affix { font-size: 14px; color: var(--text3); padding: 0 9px; }
    .field input[type="number"] { width: 88px; background: transparent; border: none; outline: none; font-size: 15px; font-weight: 500; color: var(--text); padding: 10px 6px; text-align: right; -webkit-appearance: none; font-family: inherit; }
    input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }

    /* Calculator */
    .calc-display { background: var(--surface2); border-bottom: 0.5px solid var(--border); padding: 14px 16px; text-align: right; }
    .calc-expr { font-size: 13px; color: var(--text3); min-height: 18px; margin-bottom: 2px; word-break: break-all; }
    .calc-screen { font-size: 28px; font-weight: 300; color: var(--text); letter-spacing: -0.5px; min-height: 36px; }
    .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--border); }
    .calc-grid button { background: var(--surface); border: none; font-size: 18px; font-weight: 400; color: var(--text); padding: 16px 8px; cursor: pointer; font-family: inherit; -webkit-tap-highlight-color: transparent; }
    .calc-grid button:active { opacity: 0.5; }
    .calc-grid button.op { color: var(--accent); font-weight: 500; }
    .calc-grid button.action { color: var(--text3); font-size: 15px; }
    .calc-grid button.equals { background: var(--accent); color: #fff; font-weight: 600; }
    .calc-grid button.send { background: var(--green); color: #fff; font-size: 13px; font-weight: 600; grid-column: span 4; padding: 14px; }
    .send-hint { font-size: 11px; color: var(--text3); text-align: center; padding: 8px 16px; border-top: 0.5px solid var(--border); }

    /* Product Picker */
    .picker-loading { padding: 20px 16px; text-align: center; font-size: 14px; color: var(--text3); }
    .picker-error { padding: 16px; text-align: center; font-size: 13px; color: #c0392b; }
    .brand-tabs { display: flex; overflow-x: auto; gap: 0; border-bottom: 0.5px solid var(--border); -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .brand-tabs::-webkit-scrollbar { display: none; }
    .brand-tab { flex-shrink: 0; padding: 10px 18px; font-size: 13px; font-weight: 600; color: var(--text3); cursor: pointer; border-bottom: 2px solid transparent; background: none; border-top: none; border-left: none; border-right: none; font-family: inherit; -webkit-tap-highlight-color: transparent; }
    .brand-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .category-label { padding: 10px 16px 4px; font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text3); background: var(--surface2); border-bottom: 0.5px solid var(--border); }
    .product-row { display: flex; align-items: center; padding: 10px 16px; border-bottom: 0.5px solid var(--border); gap: 10px; }
    .product-row:last-child { border-bottom: none; }
    .product-info { flex: 1; }
    .product-name { font-size: 14px; color: var(--text); }
    .product-price { font-size: 12px; color: var(--text3); margin-top: 1px; }
    .qty-wrap { display: flex; align-items: center; background: var(--surface2); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); overflow: hidden; }
    .qty-btn { width: 32px; height: 32px; background: none; border: none; font-size: 18px; color: var(--accent); cursor: pointer; font-family: inherit; -webkit-tap-highlight-color: transparent; display: flex; align-items: center; justify-content: center; }
    .qty-btn:active { opacity: 0.5; }
    .qty-val { width: 28px; text-align: center; font-size: 14px; font-weight: 600; color: var(--text); }
    .selected-summary { border-top: 0.5px solid var(--border); }
    .selected-item { display: flex; justify-content: space-between; align-items: center; padding: 9px 16px; border-bottom: 0.5px solid var(--border); font-size: 13px; }
    .selected-item:last-child { border-bottom: none; }
    .selected-item .si-name { color: var(--text2); flex: 1; }
    .selected-item .si-val { color: var(--text); font-weight: 500; white-space: nowrap; margin-left: 8px; }
    .selected-total { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: var(--accent-bg); border-top: 0.5px solid var(--border); }
    .selected-total span { font-size: 14px; font-weight: 600; color: var(--accent); }
    .send-materials-btn { display: block; width: calc(100% - 32px); margin: 12px 16px; padding: 13px; background: var(--green); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer; -webkit-tap-highlight-color: transparent; text-align: center; }
    .send-materials-btn:active { opacity: 0.8; }

    /* Wire & Misc */
    .add-btn { display: block; width: calc(100% - 32px); margin: 12px 16px; padding: 13px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer; -webkit-tap-highlight-color: transparent; text-align: center; }
    .add-btn:active { opacity: 0.8; }

    /* Results */
    .results-card { background: var(--surface); border-radius: var(--radius); border: 0.5px solid var(--border); margin-bottom: 12px; overflow: hidden; }
    .result-row { display: flex; justify-content: space-between; align-items: center; padding: 13px 16px; border-bottom: 0.5px solid var(--border); }
    .result-row:last-child { border-bottom: none; }
    .rl { font-size: 14px; color: var(--text2); flex: 1; padding-right: 8px; }
    .rv { font-size: 15px; font-weight: 600; color: var(--text); white-space: nowrap; }
    .result-row.big { background: var(--accent-bg); padding: 16px; }
    .result-row.big .rl { font-size: 15px; font-weight: 600; color: var(--accent); }
    .result-row.big .rv { font-size: 20px; color: var(--accent); }
    .result-row.profit .rl { color: var(--green); font-weight: 500; }
    .result-row.profit .rv { color: var(--green); }
    .reset-btn { display: block; width: 100%; padding: 15px; background: var(--surface); border: 0.5px solid var(--border2); border-radius: var(--radius); font-size: 15px; font-weight: 500; color: var(--text2); text-align: center; cursor: pointer; font-family: inherit; margin-bottom: 12px; -webkit-tap-highlight-color: transparent; }
    .reset-btn:active { opacity: 0.6; }
    .footer-note { text-align: center; font-size: 11px; color: var(--text3); padding-bottom: 8px; }
  </style>
</head>
<body>
<header>
  <h1>&#127807; Landscape Lighting Pricing</h1>
  <p>Enter your numbers — results update instantly</p>
</header>
<main>

  <!-- Calculator -->
  <div class="card">
    <div class="card-header">Calculator → Materials cost</div>
    <div class="calc-display">
      <div class="calc-expr" id="calc-expr"></div>
      <div class="calc-screen" id="calc-screen">0</div>
    </div>
    <div class="calc-grid">
      <button class="action" onclick="calcAction('clear')">AC</button>
      <button class="action" onclick="calcAction('sign')">+/-</button>
      <button class="action" onclick="calcAction('pct')">%</button>
      <button class="op" onclick="calcInput('/')">÷</button>
      <button onclick="calcInput('7')">7</button>
      <button onclick="calcInput('8')">8</button>
      <button onclick="calcInput('9')">9</button>
      <button class="op" onclick="calcInput('*')">×</button>
      <button onclick="calcInput('4')">4</button>
      <button onclick="calcInput('5')">5</button>
      <button onclick="calcInput('6')">6</button>
      <button class="op" onclick="calcInput('-')">−</button>
      <button onclick="calcInput('1')">1</button>
      <button onclick="calcInput('2')">2</button>
      <button onclick="calcInput('3')">3</button>
      <button class="op" onclick="calcInput('+')">+</button>
      <button onclick="calcInput('0')" style="grid-column:span 2;text-align:left;padding-left:24px;">0</button>
      <button onclick="calcInput('.')">.</button>
      <button class="equals" onclick="calcAction('equals')">=</button>
      <button class="send" onclick="sendCalcToMaterials()">&#8595; Send to Materials Cost</button>
    </div>
    <div class="send-hint">Tap "Send to Materials Cost" to populate the field below</div>
  </div>

  <!-- Product Picker -->
  <div class="card">
    <div class="card-header">
      <span>Product picker</span>
      <button onclick="clearSelections()">Clear all</button>
    </div>
    <div id="picker-body"><div class="picker-loading">Loading products...</div></div>
    <div id="selected-summary" class="selected-summary" style="display:none"></div>
  </div>

  <!-- Wire & Misc -->
  <div class="card">
    <div class="card-header">Wire &amp; misc materials</div>
    <div class="field">
      <label>Wire cost</label>
      <div class="input-wrap"><span class="affix">$</span><input type="number" id="wire" inputmode="decimal" placeholder="0.00" min="0" step="0.01"></div>
    </div>
    <div class="field">
      <label>Misc materials</label>
      <div class="input-wrap"><span class="affix">$</span><input type="number" id="miscmat" inputmode="decimal" placeholder="0.00" min="0" step="0.01"></div>
    </div>
    <button class="add-btn" onclick="sendWireToMaterials()">&#8595; Add to Materials Cost</button>
  </div>
